# Railway config-as-code pour le storefront Next.js.
#
# IMPORTANT : Railway ne découvre PAS ce fichier via le Root Directory.
# Dans le service storefront → Settings → Config-as-code, renseigner :
#   apps/storefront/railway.toml
#
# Le conflit de peer deps (react 19 / daisyui / three…) est résolu par la
# variable d'env NPM_CONFIG_LEGACY_PEER_DEPS=true (définie côté dashboard).

[build]
builder = "RAILPACK"

[deploy]
# Next lit le PORT injecté par Railway (start = `next start`, sans -p).
startCommand = "npm run start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
