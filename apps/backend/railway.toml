# Railway config-as-code pour le backend Medusa v2.
#
# IMPORTANT : Railway ne découvre PAS ce fichier via le Root Directory.
# Dans le service backend → Settings → Config-as-code, renseigner le chemin :
#   apps/backend/railway.toml
#
# Le conflit de peer deps (react 18 vs 19 via @medusajs/icons) est résolu
# par la variable d'env NPM_CONFIG_LEGACY_PEER_DEPS=true (définie côté
# dashboard), lue nativement par npm au build ET au runtime — Railpack ne
# copiant que package.json + lockfile, un .npmrc ne serait pas lu au build.

[build]
builder = "RAILPACK"

[deploy]
# Medusa v2 démarre depuis .medusa/server (produit par `medusa build`).
# npm install y est nécessaire (le dossier n'a pas de node_modules),
# puis predeploy (db:migrate) avant le start.
startCommand = "cd .medusa/server && npm install && npm run predeploy && npm run start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
